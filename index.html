<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国文字版：比格大战狗系精灵王</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --panel-color: #ffffff;
            --primary-color: #4a90e2;
            --hp-green: #2ecc71;
            --hp-red: #e74c3c;
            --energy-gold: #f39c12;
            --border-radius: 16px;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 95%;
            max-width: 850px;
            background: var(--panel-color);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .screen { text-align: center; }
        .hidden { display: none !important; }

        .battle-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .entity-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: left;
        }

        .hp-container {
            width: 100%;
            height: 30px;
            background: #dee2e6;
            border-radius: 15px;
            margin: 10px 0;
            overflow: hidden;
            position: relative;
            border: 2px solid #bdc3c7;
        }

        .hp-bar {
            height: 100%;
            background: var(--hp-green);
            transition: width 0.5s ease-in-out;
            position: absolute;
            left: 0;
            top: 0;
            z-index: 1;
        }

        .hp-value-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            font-size: 16px;
            font-weight: 900;
            color: #000;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.9), -1px -1px 2px rgba(255,255,255,0.9);
            pointer-events: none;
        }

        .energy-tag { font-weight: bold; color: var(--energy-gold); font-size: 1.1em; }
        .status-display { font-size: 0.9em; color: #5a6674; min-height: 50px; border-top: 1px solid #eee; padding-top: 8px; margin-top: 5px; font-weight: bold;}

        #report-panel {
            background: #fff;
            border: 2px solid var(--primary-color);
            border-radius: var(--border-radius);
            margin: 20px 0;
            padding: 20px;
        }

        .report-log { text-align: left; line-height: 1.8; padding: 15px; background: #f0f7ff; border-radius: 8px; border-left: 5px solid var(--primary-color); font-size: 1.1em; }
        
        /* 标签样式 */
        .type-tag { font-size: 0.8em; padding: 2px 6px; border-radius: 4px; margin-right: 5px; font-weight: bold; }
        .tag-atk { background: #ffebeb; color: #e74c3c; border: 1px solid #e74c3c; }
        .tag-sts { background: #ebf5ff; color: #4a90e2; border: 1px solid #4a90e2; }

        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .btn { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .skill-btn { background: #fff; border: 1.5px solid #dcdfe6; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .skill-btn:hover { background: #f0f7ff; border-color: var(--primary-color); }
        .skill-btn b { color: #2c3e50; }
        .skill-btn small { color: #7f8c8d; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen">
        <h1 style="color:var(--primary-color)">洛克王国文字版</h1>
        <h3>比格大战狗系精灵王Gous</h3>
        <p style="color:#7f8c8d; margin:30px 0;">Gous是每个狗系爱好者洛克的梦。</p>
        <button class="btn" style="width:200px" onclick="game.start()">进入战斗</button>
    </div>

    <div id="battle-screen" class="screen hidden">
        <div class="battle-header">
            <div class="entity-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>比格</strong>
                    <span id="p-energy" class="energy-tag">★10</span>
                </div>
                <div class="hp-container">
                    <div class="hp-value-overlay" id="p-hp-num">800 / 800</div>
                    <div id="p-hp-bar" class="hp-bar"></div>
                </div>
                <div id="p-status" class="status-display">状态: 正常</div>
            </div>
            <div class="entity-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>Gous</strong>
                    <span id="e-energy" class="energy-tag">★10</span>
                </div>
                <div class="hp-container">
                    <div class="hp-value-overlay" id="e-hp-num">10000 / 10000</div>
                    <div id="e-hp-bar" class="hp-bar" style="background:var(--hp-red)"></div>
                </div>
                <div id="e-status" class="status-display">状态: 正常</div>
            </div>
        </div>

        <div id="report-panel" class="hidden">
            <div class="report-log" id="turn-description"></div>
            <button class="btn" style="margin-top:15px; width:100%" onclick="game.nextTurn()">确认</button>
        </div>

        <div id="main-controls" class="controls">
            <button class="skill-btn" onclick="game.handleSkill('scratch')"><b>挠痒痒</b><br><small>攻击 | 耗3</small></button>
            <button class="skill-btn" onclick="game.handleSkill('wer1')"><b>wer</b><br><small>状态 | 耗1</small></button>
            <button class="skill-btn" onclick="game.handleSkill('wer2')"><b>wer wer</b><br><small>状态 | 耗2</small></button>
            <button class="skill-btn" onclick="game.handleSkill('wer3')"><b>wer wer wer</b><br><small>状态 | 耗3</small></button>
            <button class="skill-btn" onclick="game.handleSkill('charge')"><b>聚能</b><br><small>状态 | 耗0</small></button>
            <button class="skill-btn" style="background:var(--hp-red); color:#fff; border:none" onclick="game.toggleMenu('catch')"><b>捕捉</b></button>
        </div>

        <div id="catch-controls" class="controls hidden">
            <button class="skill-btn" onclick="game.handleCatch('prism')">棱镜球</button>
            <button class="skill-btn" onclick="game.handleCatch('palu')">大师帕鲁球</button>
            <button class="skill-btn" onclick="game.handleCatch('master')">大师球</button>
            <button class="skill-btn" onclick="game.toggleMenu('main')">返回</button>
        </div>
    </div>

    <div id="end-screen" class="screen hidden">
        <h2 id="end-title">结局</h2>
        <p id="end-msg" style="padding:20px; font-size:1.2em;"></p>
        <button class="btn" onclick="location.reload()">重新挑战</button>
    </div>
</div>

<script>
    const game = {
        p: { hp: 800, max: 800, en: 10, nextDef: null },
        e: { hp: 10000, max: 10000, en: 10, mark: 0, atkBuff: 1 },
        report: { main: "" },
        isOver: false, win: false, msg: "",

        start() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('battle-screen').classList.remove('hidden');
            this.updateUI();
        },

        updateUI() {
            document.getElementById('p-hp-bar').style.width = (this.p.hp / this.p.max * 100) + "%";
            document.getElementById('p-hp-num').innerText = `${Math.ceil(Math.max(0, this.p.hp))} / ${this.p.max}`;
            document.getElementById('p-energy').innerText = `★${this.p.en}`;
            document.getElementById('e-hp-bar').style.width = (this.e.hp / this.e.max * 100) + "%";
            document.getElementById('e-hp-num').innerText = `${Math.ceil(Math.max(0, this.e.hp))} / ${this.e.max}`;
            document.getElementById('e-energy').innerText = `★${this.e.en}`;
            let eStates = [];
            if (this.e.atkBuff > 1) eStates.push(`威力 +${Math.round((this.e.atkBuff-1)*100)}%`);
            if (this.e.mark > 0) eStates.push(`印记：${this.e.mark}层`);
            document.getElementById('e-status').innerText = "状态: " + (eStates.length > 0 ? eStates.join(" | ") : "正常");
        },

        toggleMenu(type) {
            document.getElementById('main-controls').classList.toggle('hidden', type !== 'main');
            document.getElementById('catch-controls').classList.toggle('hidden', type !== 'catch');
        },

        handleSkill(skillId) {
            const sData = {
                'scratch': { en: 3, name: "挠痒痒", logic: "攻击" },
                'wer1': { en: 1, name: "wer", logic: "状态" },
                'wer2': { en: 2, name: "wer wer", logic: "状态" },
                'wer3': { en: 3, name: "wer wer wer", logic: "状态" },
                'charge': { en: 0, name: "聚能", logic: "状态" }
            };
            const s = sData[skillId];
            if (this.p.en < s.en) return alert("能量不足！");
            this.p.en -= s.en;

            const tag = s.logic === "攻击" ? '<span class="type-tag tag-atk">攻击</span>' : '<span class="type-tag tag-sts">状态</span>';
            this.report.main = `【比格】使用了 ${tag} <b>${s.name}</b>。<br>`;
            
            if(skillId === 'scratch') this.e.hp -= 10000;
            if(skillId === 'wer1') { this.e.mark += 1; this.p.nextDef = 'wer1'; }
            if(skillId === 'wer2') { this.e.mark += 3; this.p.nextDef = 'wer2'; }
            if(skillId === 'wer3') this.e.mark += 10000;
            if(skillId === 'charge') this.p.en = Math.min(10, this.p.en + 5);

            this.checkHiddenRules();
            if(!this.checkDead()) this.enemyTurn();
            this.showReport();
        },

        handleCatch(type) {
            if (type !== 'prism') {
                this.report.main = `【捕捉】你掏出了一个异世界的球...<br><b>“这不是洛克王国的球！”</b> 你尴尬地把它收了回去。<br>`;
            } else {
                if (Math.ceil(this.e.hp) > 1) {
                    this.report.main = `【捕捉】棱镜球还没飞到就被Gous的手抖震碎了。血量还不够低！<br>`;
                } else {
                    const r = Math.random();
                    this.report.main = `<b style="color:#e67e22">【捕捉成功！】球剧烈摇晃着...捕捉成功，让我们看看是什么颜色呢？</b><br>`;
                    if (r < 0.2) this.setFinal(true, "【赛季炫彩】你捕捉到了【完美无暇】的Gous！");
                    else if (r < 0.8) this.setFinal(false, "【红配绿炫彩】这也太丑了！你痛苦地把他放生（或肢解）了。");
                    else this.setFinal(false, "球炸了！你丢球太用力把丝血的Gous砸成了碎片。");
                    this.showReport();
                    return;
                }
            }
            if(!this.checkDead()) this.enemyTurn();
            this.showReport();
        },

        enemyTurn() {
            let move = "";
            let cost = 0;
            const r = Math.random();
            if (this.e.en >= 10 && r < 0.4) { move = "escape"; cost = 10; }
            else if (this.e.en >= 5 && r < 0.6) { move = "h_drink"; cost = 5; }
            else if (this.e.en >= 1) { move = r < 0.6 ? "bark" : "drink"; cost = 1; }
            else { move = "charge"; cost = 0; }

            const mData = {
                'bark': { name: 'Gous叫', type: '攻击' },
                'drink': { name: '喝酒', type: '状态' },
                'h_drink': { name: '喝很多酒', type: '状态' },
                'charge': { name: '聚能', type: '状态' },
                'escape': { name: '逃跑', type: '状态' }
            };
            
            const m = mData[move];
            const tag = m.type === "攻击" ? '<span class="type-tag tag-atk">攻击</span>' : '<span class="type-tag tag-sts">状态</span>';
            this.e.en -= cost;
            this.report.main += `【Gous】使用了 ${tag} <b>${m.name}</b>。<br>`;

            if (this.p.nextDef === 'wer2' && m.type === '状态') {
                this.report.main += `<b style="color:var(--primary-color)"><i>└─ 比格应对状态！</i></b><br>`;
            } else {
                if (move === 'bark') {
                    let dmg = 800 * this.e.atkBuff;
                    if (this.p.nextDef === 'wer1') {
                        dmg *= 0.1; this.p.hp += 1;
                        this.report.main += `<b style="color:var(--hp-green)"><i>└─ 比格应对攻击！(减伤90%)</i></b><br>`;
                    }
                    this.p.hp -= dmg;
                } else if (move === 'drink') this.e.atkBuff += 1;
                else if (move === 'h_drink') this.e.atkBuff += 6;
                else if (move === 'charge') this.e.en = Math.min(10, this.e.en + 5);
                else if (move === 'escape') { this.p.hp = 0; this.e.hp = 0; }
            }
            this.p.nextDef = null;
            this.checkDead();
        },

        checkHiddenRules() {
            if (this.e.mark === 7) { this.e.hp -= 9999; this.e.mark = 0; this.report.main += `<b>[印记爆发]</b> 触发隐藏机制，造成巨额伤害！<br>`; }
            else if (this.e.mark > 10) this.e.hp = 0;
        },

        checkDead() {
            if (this.p.hp <= 0) { this.setFinal(false, "比格力竭了，捕捉失败。"); return true; }
            if (this.e.hp <= 0 && !this.isOver) { this.setFinal(false, "糟糕，Gous被打倒了，你错失了捕捉机会。"); return true; }
            return false;
        },

        setFinal(win, msg) { this.isOver = true; this.win = win; this.msg = msg; },

        showReport() {
            document.getElementById('turn-description').innerHTML = this.report.main;
            document.getElementById('main-controls').classList.add('hidden');
            document.getElementById('catch-controls').classList.add('hidden');
            document.getElementById('report-panel').classList.remove('hidden');
            this.updateUI();
        },

        nextTurn() {
            if (this.isOver) {
                document.getElementById('battle-screen').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
                document.getElementById('end-title').innerText = this.win ? "🎉 捕捉大获成功！" : "❌ 战斗结束";
                document.getElementById('end-msg').innerText = this.msg;
            } else {
                document.getElementById('report-panel').classList.add('hidden');
                document.getElementById('main-controls').classList.remove('hidden');
                this.toggleMenu('main');
            }
        }
    };
</script>
</body>
</html>
